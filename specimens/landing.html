<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing page specimen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&amp;family=Geist+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="specimens.css">
</head>
<body class="capture-card">
  <main class="capture">
    <section class="screen landing" aria-label="Abstract landing page interface specimen">
      <header class="landing-nav">
        <div class="landing-logo">
          <span></span>
          <strong>Product</strong>
        </div>
        <nav class="landing-links mono" aria-label="Landing page navigation">
          <span>Features</span>
          <span>Pricing</span>
          <span>Docs</span>
        </nav>
        <span class="landing-nav-cta mono">Get started</span>
      </header>

      <section class="landing-hero">
        <div class="landing-hero-copy">
          <span class="landing-kicker mono">Launch page</span>
          <h1>Build, launch, and learn faster.</h1>
          <p>One focused product surface with onboarding, pricing, proof, and a clear conversion path.</p>
          <div class="landing-actions">
            <span class="landing-primary mono">Start now</span>
            <span class="landing-secondary mono">View demo</span>
          </div>
        </div>

        <aside class="landing-offer-panel panel" aria-label="Abstract offer panel">
          <div class="browser-chrome">
            <i></i><i></i><i></i>
            <span class="browser-bar"></span>
          </div>
          <div class="browser-body">
            <div class="browser-hero-img"></div>
            <div class="browser-stats">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="browser-cta">
              <span></span>
              <span></span>
            </div>
            <div class="browser-proof">
              <span class="quote-mark"></span>
              <div>
                <p></p>
                <p style="--w: 82%"></p>
                <p style="--w: 56%"></p>
              </div>
            </div>
          </div>
        </aside>
      </section>

      <section class="landing-proof mono" aria-label="Abstract proof strip">
        <span>Trusted by</span>
        <i></i>
        <i></i>
        <i></i>
        <i></i>
      </section>

      <section class="landing-feature-grid">
        <article>
          <span class="feature-icon"></span>
          <strong class="mono">Onboard</strong>
          <p></p>
          <p style="--w: 68%"></p>
        </article>
        <article>
          <span class="feature-icon"></span>
          <strong class="mono">Convert</strong>
          <p></p>
          <p style="--w: 72%"></p>
        </article>
        <article>
          <span class="feature-icon"></span>
          <strong class="mono">Measure</strong>
          <p></p>
          <p style="--w: 64%"></p>
        </article>
      </section>
    </section>
  </main>
</body>
</html>
