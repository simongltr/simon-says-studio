<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web app specimen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&amp;family=Geist+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="specimens.css">
</head>
<body class="capture-card">
  <main class="capture">
    <section class="screen board" aria-label="Abstract web app interface specimen">
      <header class="board-top panel">
        <div>
          <span class="mono muted">Workspace</span>
          <strong>Product board</strong>
        </div>
        <div class="board-top-actions">
          <span class="chip mono">Filter</span>
          <span class="chip mono">+ New</span>
        </div>
      </header>

      <section class="board-shell">
        <aside class="board-rail panel" aria-hidden="true">
          <span class="is-active"></span>
          <span></span>
          <span></span>
          <span></span>
        </aside>

        <section class="board-columns">
          <div class="board-col">
            <div class="board-col-head mono muted">
              <span>Backlog</span>
              <span>4</span>
            </div>
            <div class="board-card panel">
              <b></b>
              <b style="--w: 58%"></b>
              <div class="card-foot">
                <span class="chip mono">Design</span>
                <i></i>
              </div>
            </div>
            <div class="board-card panel">
              <b style="--w: 72%"></b>
              <b style="--w: 44%"></b>
              <div class="card-foot">
                <span class="chip mono">Eng</span>
                <i></i>
              </div>
            </div>
            <div class="board-card panel">
              <b style="--w: 60%"></b>
              <div class="card-foot">
                <span class="chip mono">Ops</span>
                <i></i>
              </div>
            </div>
          </div>

          <div class="board-col">
            <div class="board-col-head mono muted">
              <span>In progress</span>
              <span>3</span>
            </div>
            <div class="board-card panel is-active">
              <b></b>
              <b style="--w: 64%"></b>
              <span class="card-bar"><span style="--w: 68%"></span></span>
              <div class="card-foot">
                <span class="chip mono">Eng</span>
                <i></i>
              </div>
            </div>
            <div class="board-card panel">
              <b style="--w: 80%"></b>
              <span class="card-bar"><span style="--w: 34%"></span></span>
              <div class="card-foot">
                <span class="chip mono">Design</span>
                <i></i>
              </div>
            </div>
          </div>

          <div class="board-col">
            <div class="board-col-head mono muted">
              <span>Done</span>
              <span>8</span>
            </div>
            <div class="board-card panel is-done">
              <b style="--w: 78%"></b>
              <div class="card-foot">
                <span class="chip mono">Eng</span>
                <i></i>
              </div>
            </div>
            <div class="board-card panel is-done">
              <b style="--w: 62%"></b>
              <div class="card-foot">
                <span class="chip mono">Design</span>
                <i></i>
              </div>
            </div>
            <div class="board-card panel is-done">
              <b style="--w: 86%"></b>
              <div class="card-foot">
                <span class="chip mono">Ops</span>
                <i></i>
              </div>
            </div>
          </div>
        </section>
      </section>
    </section>
  </main>
</body>
</html>
